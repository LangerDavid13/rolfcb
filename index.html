<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<title>A4 generátor</title>
https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js
<style>
body { background:#ded6c6; font-family: Georgia, serif; }
.controls { margin:20px; }
button{ margin-left:10px; padding:6px 12px; }

#a4 {
  width:794px;
  height:1123px;
  background:#f3eee6;
  margin:auto;
  padding:30px 50px;
  box-sizing:border-box;
  position:relative;
  color:#7c5a2b;
}

.logo {
  display:block;
  margin:0 auto;
  width:300px;
}

.date { text-align:center; margin:15px 0 25px; font-size:20px; }

.block { margin-top:20px; }
.labels {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  text-align:center;
  font-size:20px;
  margin-bottom:5px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:25px;
}

.slot {
  border:4px solid #caa96c;
  height:220px;
  position:relative;
  overflow:hidden;
  background:#fff;
}

.slot img {
  position:absolute;
  top:0; left:0;
  transform-origin:top left;
  pointer-events:none;
}

.plus {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:#bbb;
  cursor:pointer;
}

.quote {
  position:absolute;
  bottom:120px;
  width:100%;
  text-align:center;
  font-size:22px;
}

.ida {
  position:absolute;
  bottom:90px;
  right:50px;
  font-size:18px;
}

.author {
  position:absolute;
  bottom:40px;
  left:50px;
  font-size:18px;
}

input[type=file]{ display:none; }
</style>
</head>
<body>

<div class="controls">
Datum: <input id="dateInput" type="text" value="Listopad 2025 - Duben 2026">
<button id="exportBtn">Stáhnout PNG</button>
</div>

<div id="a4">
  <img src="logo.png" class="logo" />

  <div class="date" id="dateText">Datum: Listopad 2025 - Duben 2026</div>

  <div class="block">
    <div class="labels"><div>Před</div><div>Po</div><div>Před</div><div>Po</div></div>
    <div class="grid" id="grid1"></div>
  </div>

  <div class="block">
    <div class="labels"><div>Před</div><div>Po</div><div>Před</div><div>Po</div></div>
    <div class="grid" id="grid2"></div>
  </div>

  <div class="quote">Tělo je sítí vztahů, struktura určuje funkci.</div>
  <div class="ida">- Ida Rolf -</div>
  <div class="author">Kateřina Lacko</div>
</div>

<script>
function createSlot(){
  const wrap=document.createElement("div");
  const slot=document.createElement("div");
  slot.className="slot";

  const plus=document.createElement("div");
  plus.className="plus";
  plus.textContent="+";

  const input=document.createElement("input");
  input.type="file";
  input.accept="image/*";

  slot.appendChild(plus);
  wrap.appendChild(slot);
  wrap.appendChild(input);

  let img=null, scale=1, x=0, y=0;
  let dragging=false, startX=0, startY=0;

  plus.onclick=()=> input.click();

  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{
      if(!img){ img=document.createElement("img"); slot.appendChild(img); }
      img.src=ev.target.result;
      plus.style.display="none";
    };
    r.readAsDataURL(file);
  };

  slot.addEventListener("wheel", e=>{
    if(!img) return;
    e.preventDefault();
    scale+=e.deltaY*-0.001;
    scale=Math.min(Math.max(0.2,scale),5);
    update();
  });

  slot.addEventListener("mousedown", e=>{
    if(!img) return;
    dragging=true;
    startX=e.clientX - x;
    startY=e.clientY - y;
  });

  document.addEventListener("mousemove", e=>{
    if(!dragging) return;
    x=e.clientX - startX;
    y=e.clientY - startY;
    update();
  });

  document.addEventListener("mouseup", ()=> dragging=false);

  function update(){
    if(!img) return;
    img.style.transform=`translate(${x}px,${y}px) scale(${scale})`;
  }

  return wrap;
}

for(let i=0;i<4;i++) document.getElementById("grid1").appendChild(createSlot());
for(let i=0;i<4;i++) document.getElementById("grid2").appendChild(createSlot());

const dateInput=document.getElementById("dateInput");
const dateText=document.getElementById("dateText");
dateInput.oninput=()=> dateText.textContent="Datum: "+dateInput.value;

// ✅ export funguje i na mobilu

document.getElementById("exportBtn").addEventListener("click", async ()=>{
  const canvas = await html2canvas(document.querySelector("#a4"), {scale:3});

  canvas.toBlob(function(blob){
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "vystup.png";
    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);
  }, "image/png");
});
</script>

</body>
</html>
