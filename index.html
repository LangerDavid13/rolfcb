<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<title>A4 generátor</title>
https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js
<style>
body { background:#ded6c6; font-family: Georgia, serif; }
.controls { margin:20px; }
button{ margin-left:10px; padding:6px 12px; }

#a4 {
  width:794px;
  height:1123px;
  background:#f3eee6;
  margin:auto;
  padding:30px 50px;
  box-sizing:border-box;
  position:relative;
  color:#7c5a2b;
}

.logo { display:block; margin:0 auto; width:300px; }
.date { text-align:center; margin:15px 0 35px; font-size:20px; }

.block { margin-top:30px; }

.row {
  display:grid;
  grid-template-columns:1fr 1fr 80px 1fr 1fr;
  gap:25px;
}

.label {
  text-align:center;
  font-size:20px;
  margin-bottom:5px;
}

.slot {
  border:4px solid #caa96c;
  height:220px;
  position:relative;
  overflow:hidden;
  background:#fff;
}

.slot img {
  position:absolute;
  top:0; left:0;
  transform-origin:top left;
  pointer-events:none;
}

.plus {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:#bbb;
  cursor:pointer;
}

.quote {
  position:absolute;
  bottom:120px;
  width:100%;
  text-align:center;
  font-size:22px;
}

.ida {
  position:absolute;
  bottom:90px;
  right:50px;
  font-size:18px;
}

.author {
  position:absolute;
  bottom:40px;
  left:50px;
  font-size:18px;
}

input[type=file]{ display:none; }
</style>
</head>
<body>

<div class="controls">
Datum: <input id="dateInput" type="text" value="Listopad 2025 - Duben 2026">
<button id="exportBtn">Stáhnout PNG</button>
</div>

<div id="a4">
  <img src="logo.png" class="logo" />
  <div class="date" id="dateText">Datum: Listopad 2025 - Duben 2026</div>

  <div class="block" id="grid1"></div>
  <div class="block" id="grid2"></div>

  <div class="quote">Tělo je sítí vztahů, struktura určuje funkci.</div>
  <div class="ida">- Ida Rolf -</div>
  <div class="author">Kateřina Lacko</div>
</div>

<script>
function createSlot(){
  const wrap=document.createElement("div");

  const label=document.createElement("div");
  label.className="label";

  const slot=document.createElement("div");
  slot.className="slot";

  const plus=document.createElement("div");
  plus.className="plus";
  plus.textContent="+";

  const input=document.createElement("input");
  input.type="file";
  input.accept="image/*";

  slot.appendChild(plus);
  wrap.appendChild(label);
  wrap.appendChild(slot);
  wrap.appendChild(input);

  let img=null, scale=1, x=0, y=0;
  let dragging=false, startX=0, startY=0;
  let lastDist=null;

  plus.onclick=()=> input.click();

  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{
      if(!img){ img=document.createElement("img"); slot.appendChild(img); }
      img.src=ev.target.result;
      plus.style.display="none";
    };
    r.readAsDataURL(file);
  };

  // mouse zoom
  slot.addEventListener("wheel", e=>{
    if(!img) return;
    e.preventDefault();
    scale+=e.deltaY*-0.001;
    scale=Math.max(0.2, Math.min(scale,5));
    update();
  });

  // mouse drag
  slot.addEventListener("mousedown", e=>{
    dragging=true;
    startX=e.clientX-x;
    startY=e.clientY-y;
  });

  document.addEventListener("mousemove", e=>{
    if(!dragging) return;
    x=e.clientX-startX;
    y=e.clientY-startY;
    update();
  });

  document.addEventListener("mouseup", ()=> dragging=false);

  // touch drag + pinch
  slot.addEventListener("touchstart", e=>{
    if(e.touches.length===1){
      dragging=true;
      startX=e.touches[0].clientX-x;
      startY=e.touches[0].clientY-y;
    }
    if(e.touches.length===2){
      lastDist = distance(e.touches[0], e.touches[1]);
    }
  });

  slot.addEventListener("touchmove", e=>{
    e.preventDefault();
    if(e.touches.length===1 && dragging){
      x=e.touches[0].clientX-startX;
      y=e.touches[0].clientY-startY;
      update();
    }
    if(e.touches.length===2){
      const dist = distance(e.touches[0], e.touches[1]);
      if(lastDist){
        scale += (dist-lastDist)*0.005;
        scale=Math.max(0.2, Math.min(scale,5));
        update();
      }
      lastDist=dist;
    }
  }, {passive:false});

  slot.addEventListener("touchend", ()=>{
    dragging=false;
    lastDist=null;
  });

  function distance(a,b){
    return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
  }

  function update(){
    if(img) img.style.transform=`translate(${x}px,${y}px) scale(${scale})`;
  }

  return {wrap,label};
}

function createRow(container){
  const row=document.createElement("div");
  row.className="row";

  const s1=createSlot(); s1.label.textContent="Před";
  const s2=createSlot(); s2.label.textContent="Po";
  const spacer=document.createElement("div");
  const s3=createSlot(); s3.label.textContent="Před";
  const s4=createSlot(); s4.label.textContent="Po";

  row.append(s1.wrap, s2.wrap, spacer, s3.wrap, s4.wrap);
  container.appendChild(row);
}

createRow(document.getElementById("grid1"));
createRow(document.getElementById("grid2"));

const dateInput=document.getElementById("dateInput");
const dateText=document.getElementById("dateText");
dateInput.oninput=()=> dateText.textContent="Datum: "+dateInput.value;

// export

document.getElementById("exportBtn").onclick = async ()=>{
  try{
    const canvas = await html2canvas(document.getElementById("a4"), {
      scale:3,
      useCORS:true
    });

    const link = document.createElement("a");
    link.download = "vystup.png";
    link.href = canvas.toDataURL("image/png");
    link.click();

  }catch(e){
    alert("Export selhal – pravděpodobně kvůli hostingu nebo cache. Zkus stránku reloadnout (Ctrl+F5).");
    console.error(e);
  }
};
</script>

</body>
</html>
